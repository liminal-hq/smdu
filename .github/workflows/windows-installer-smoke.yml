name: Windows Installer Smoke

on:
  push:
    branches:
      - feat/windows-wix-installer
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-binaries:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            bun_target: bun-windows-x64
          - os: ubuntu-latest
            target: windows-arm64
            bun_target: bun-windows-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Build standalone binary
        run: bun build --compile --minify --sourcemap --bytecode src/cli.tsx --outfile dist/smdu --format esm --target ${{ matrix.bun_target }}

      - name: Prepare release asset (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          ASSET="dist/smdu-smoke-${{ matrix.target }}.exe"
          if [ -f dist/smdu ]; then
            mv dist/smdu "$ASSET"
          elif [ -f dist/smdu.exe ]; then
            mv dist/smdu.exe "$ASSET"
          else
            echo "Expected binary output was not found in dist/"
            exit 1
          fi

      - name: Prepare release asset (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = 'dist/smdu-smoke-${{ matrix.target }}.exe'
          if (Test-Path 'dist/smdu.exe') {
            Move-Item 'dist/smdu.exe' $asset
          } elseif (Test-Path 'dist/smdu') {
            Move-Item 'dist/smdu' $asset
          } else {
            Write-Error 'Expected binary output was not found in dist/'
            exit 1
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.target }}
          path: dist/smdu-smoke-${{ matrix.target }}.exe
          if-no-files-found: error

  build-windows-installers:
    name: Build MSI installers
    runs-on: windows-latest
    needs: build-windows-binaries
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download windows-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: smoke-windows-x64
          path: release-assets/windows-x64

      - name: Download windows-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: smoke-windows-arm64
          path: release-assets/windows-arm64

      - name: Build MSI installers
        shell: pwsh
        run: |
          pwsh -File scripts/build-windows-installer.ps1 `
            -Arch x64 `
            -Binary 'release-assets/windows-x64/smdu-smoke-windows-x64.exe' `
            -OutputPrefix 'release-assets/smdu-smoke-windows-x64'

          pwsh -File scripts/build-windows-installer.ps1 `
            -Arch arm64 `
            -Binary 'release-assets/windows-arm64/smdu-smoke-windows-arm64.exe' `
            -OutputPrefix 'release-assets/smdu-smoke-windows-arm64'

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-windows-installers
          path: |
            release-assets/*.msi
            release-assets/*.msi.sha256
          if-no-files-found: error
