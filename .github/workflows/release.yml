name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag (must start with v)
        required: true
        type: string
      release_draft:
        description: Create or keep this release as draft
        required: false
        default: false
        type: boolean

concurrency:
  group: "release-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${TAG}" =~ ^v.+$ ]]; then
            echo "Invalid release tag: ${TAG}" >&2
            echo "Expected a tag matching v*" >&2
            exit 1
          fi

          echo "tag_name=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_name=smdu ${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create or reuse release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          MANUAL_RELEASE_DRAFT: ${{ inputs.release_draft }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RELEASE_DRAFT="${MANUAL_RELEASE_DRAFT:-false}"
          else
            RELEASE_DRAFT="false"
          fi

          RELEASE_MATCH="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"${TAG_NAME}\") | [.id, .draft] | @tsv" \
              | head -n 1 || true
          )"

          if [[ -z "${RELEASE_MATCH}" ]]; then
            RELEASE_ID="$(
              gh api \
                --method POST \
                "repos/${GITHUB_REPOSITORY}/releases" \
                -f tag_name="${TAG_NAME}" \
                -f target_commitish="${GITHUB_SHA}" \
                -f name="${RELEASE_NAME}" \
                -f body='See assets below for platform downloads and checksums.' \
                -F generate_release_notes=true \
                -F draft="${RELEASE_DRAFT}" \
                -F prerelease=false \
                --jq '.id'
            )"
          else
            RELEASE_ID="$(awk '{print $1}' <<< "${RELEASE_MATCH}")"
            EXISTING_DRAFT="$(awk '{print $2}' <<< "${RELEASE_MATCH}")"

            if [[ "${EXISTING_DRAFT}" == "true" && "${RELEASE_DRAFT}" == "false" ]]; then
              gh api \
                --method PATCH \
                "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
                -F draft=false > /dev/null
            fi
          fi

          echo "release_id=${RELEASE_ID}" >> "${GITHUB_OUTPUT}"

  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            bun_target: bun-linux-arm64
          - os: macos-14
            target: macos-x64
            bun_target: bun-darwin-x64
          - os: macos-14
            target: macos-arm64
            bun_target: bun-darwin-arm64
          - os: windows-latest
            target: windows-x64
            bun_target: bun-windows-x64
          - os: windows-latest
            target: windows-arm64
            bun_target: bun-windows-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup WiX Toolset (Windows targets)
        if: startsWith(matrix.target, 'windows-')
        shell: pwsh
        run: |
          dotnet tool install --global wix
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install RPM tooling (Linux targets)
        if: startsWith(matrix.target, 'linux-')
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Build standalone binary
        run: bun build --compile --minify --sourcemap --bytecode src/cli.tsx --outfile dist/smdu --format esm --target ${{ matrix.bun_target }}

      - name: Build Linux packages
        if: startsWith(matrix.target, 'linux-')
        shell: bash
        run: |
          set -euo pipefail
          ARCH="x64"
          if [[ "${{ matrix.target }}" == "linux-arm64" ]]; then
            ARCH="arm64"
          fi
          scripts/build-linux-packages.sh \
            --version "${{ needs.prepare-release.outputs.tag_name }}" \
            --arch "${ARCH}" \
            --binary dist/smdu \
            --output-prefix "dist/smdu-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.target }}"

      - name: Build Windows MSI installer
        if: startsWith(matrix.target, 'windows-')
        shell: pwsh
        run: |
          $arch = 'x64'
          if ('${{ matrix.target }}' -eq 'windows-arm64') {
            $arch = 'arm64'
          }
          pwsh -File scripts/build-windows-installer.ps1 `
            -Version '${{ needs.prepare-release.outputs.tag_name }}' `
            -Arch $arch `
            -Binary 'dist/smdu.exe' `
            -OutputPrefix 'dist/smdu-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.target }}'

      - name: Prepare release asset (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          ASSET="dist/smdu-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            ASSET="${ASSET}.exe"
          fi
          if [ -f dist/smdu ]; then
            mv dist/smdu "$ASSET"
          elif [ -f dist/smdu.exe ]; then
            mv dist/smdu.exe "$ASSET"
          else
            echo "Expected binary output was not found in dist/"
            exit 1
          fi
          shasum -a 256 "$ASSET" > "${ASSET}.sha256"

      - name: Prepare release asset (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "dist/smdu-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.target }}.exe"
          if (Test-Path "dist/smdu.exe") {
            Move-Item "dist/smdu.exe" $asset
          } elseif (Test-Path "dist/smdu") {
            Move-Item "dist/smdu" $asset
          } else {
            Write-Error "Expected binary output was not found in dist/"
            exit 1
          }
          (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower() + "  " + (Split-Path $asset -Leaf) | Out-File -FilePath "$asset.sha256" -Encoding ascii

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: smdu-${{ matrix.target }}
          path: |
            dist/smdu-${{ needs.prepare-release.outputs.tag_name }}-${{ matrix.target }}*
            dist/*.deb
            dist/*.deb.sha256
            dist/*.rpm
            dist/*.rpm.sha256
            dist/*.msi
            dist/*.msi.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-binaries]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
