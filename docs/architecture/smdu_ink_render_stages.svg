<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 680" role="img" aria-labelledby="title desc">
  <title id="title">Ink Render Pipeline: Four Stages in Detail</title>
  <desc id="desc">Detailed breakdown of Ink's internal render pipeline from resized() through calculateLayout, render/Output, to log-update diffing, with source-verified function names and call chains.</desc>

  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0a1a1e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0 0;0.01 0.02;0 0" dur="28s" repeatCount="indefinite"/>
    </linearGradient>
    <pattern id="g2" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.7" fill="#36d1dc0d"/>
    </pattern>
    <linearGradient id="stA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b9d"/><stop offset="100%" stop-color="#c44569"/>
    </linearGradient>
    <linearGradient id="stB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffa751"/><stop offset="100%" stop-color="#e8850c"/>
    </linearGradient>
    <linearGradient id="stC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#36d1dc"/><stop offset="100%" stop-color="#1e8a93"/>
    </linearGradient>
    <linearGradient id="stD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#56ab2f"/><stop offset="100%" stop-color="#3d8b1e"/>
    </linearGradient>
    <linearGradient id="pipe2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="33%" stop-color="#ffa751"/>
      <stop offset="66%" stop-color="#36d1dc"/>
      <stop offset="100%" stop-color="#56ab2f"/>
    </linearGradient>
    <marker id="a2" viewBox="0 0 12 8" refX="10" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <path d="M0 0 L12 4 L0 8 L2 4 Z" fill="#ffd700"/>
    </marker>
    <filter id="sh2"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000050"/></filter>
    <filter id="gl2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .t1 { font: 800 28px "Bangers", "Impact", "Arial Black", sans-serif; fill: #ffd700; letter-spacing: 2px; }
      .t2 { font: 600 13px "Segoe UI", "Helvetica Neue", sans-serif; fill: #b8d4e3; }
      .sl { font: 800 15px "Bangers", "Impact", sans-serif; fill: #fff; letter-spacing: 1px; }
      .sl2 { font: 800 13px "Bangers", "Impact", sans-serif; letter-spacing: 1px; }
      .c1 { font: 700 11.5px "Consolas", "SF Mono", monospace; fill: #1a1a2e; }
      .c2 { font: 600 10.5px "Consolas", "SF Mono", monospace; fill: #3a3a5e; }
      .c3 { font: 700 11.5px "Consolas", "SF Mono", monospace; fill: #c44569; }
      .n1 { font: 600 10.5px "Segoe UI", "Helvetica Neue", sans-serif; }
      .lg2 { font: 600 11px "Segoe UI", "Helvetica Neue", sans-serif; fill: #708090; }
      .cb { stroke: #1a1a2e; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1400" height="680" fill="url(#bg2)"/>
  <rect width="1400" height="680" fill="url(#g2)"/>

  <g opacity="0.08">
    <circle cx="200" cy="600" r="140" fill="#ff6b9d"><animate attributeName="r" values="140;155;140" dur="18s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="80" r="100" fill="#ffa751"><animate attributeName="r" values="100;112;100" dur="22s" repeatCount="indefinite"/></circle>
    <circle cx="1200" cy="500" r="120" fill="#56ab2f"><animate attributeName="r" values="120;132;120" dur="20s" repeatCount="indefinite"/></circle>
  </g>

  <text x="36" y="40" class="t1">INK RENDER PIPELINE: FOUR STAGES</text>
  <text x="530" y="38" class="t2">Source-verified call chains from ink.js, reconciler.js, renderer.js, output.js, log-update.js</text>

  <!-- Pipeline track -->
  <path d="M50 310 L1350 310" stroke="url(#pipe2)" stroke-width="6" fill="none" opacity="0.25" stroke-linecap="round"/>
  <circle r="5" fill="#ffd700" opacity="0.7">
    <animateMotion dur="6s" repeatCount="indefinite" path="M50 310 L1350 310"/>
  </circle>

  <!-- Flow arrows between stages -->
  <g filter="url(#gl2)">
    <path d="M356 310 L390 310" stroke="#ffd700" stroke-width="4" fill="none" marker-end="url(#a2)"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></path>
    <path d="M706 310 L740 310" stroke="#ffd700" stroke-width="4" fill="none" marker-end="url(#a2)"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/></path>
    <path d="M1056 310 L1090 310" stroke="#ffd700" stroke-width="4" fill="none" marker-end="url(#a2)"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1s" repeatCount="indefinite"/></path>
  </g>

  <!-- ── STAGE A: resized() ── -->
  <g filter="url(#sh2)">
    <rect x="36" y="72" width="310" height="536" rx="14" fill="#1a1020" stroke="url(#stA)" stroke-width="2.5" opacity="0.94"/>
    <rect x="36" y="72" width="310" height="38" rx="14" fill="url(#stA)"/>
    <rect x="36" y="96" width="310" height="14" fill="url(#stA)"/>
    <text x="56" y="98" class="sl">A. RESIZE HANDLER</text>
    <text x="230" y="98" class="sl2" style="fill:#ffe0ec;">ink.js:102-112</text>

    <rect x="52" y="128" width="278" height="28" rx="6" class="cb" fill="#fff0f5"/>
    <text x="64" y="148" class="c1">Ink.resized() called by stdout</text>

    <path d="M191 158 L191 170" stroke="#ff6b9d" stroke-width="2"/>

    <rect x="52" y="174" width="278" height="42" rx="6" class="cb" fill="#fff0f5"/>
    <text x="64" y="192" class="c1">w = this.getTerminalWidth()</text>
    <text x="64" y="208" class="c2">  // stdout.columns || 80</text>

    <path d="M191 218 L191 230" stroke="#ff6b9d" stroke-width="2"/>

    <rect x="52" y="234" width="278" height="42" rx="6" class="cb" fill="#fff0f5"/>
    <text x="64" y="252" class="c1">if (w &lt; this.lastTerminalWidth)</text>
    <text x="64" y="268" class="c3">  this.log.clear()</text>

    <path d="M191 278 L191 290" stroke="#ff6b9d" stroke-width="2"/>

    <rect x="52" y="294" width="278" height="28" rx="6" class="cb" fill="#ffe0ec"/>
    <text x="64" y="314" class="c1" style="font-weight:800;">this.calculateLayout()</text>

    <path d="M191 324 L191 336" stroke="#ff6b9d" stroke-width="2"/>

    <rect x="52" y="340" width="278" height="28" rx="6" class="cb" fill="#ffe0ec"/>
    <text x="64" y="360" class="c1" style="font-weight:800;">this.onRender()</text>

    <path d="M191 370 L191 382" stroke="#ff6b9d" stroke-width="2"/>

    <rect x="52" y="386" width="278" height="28" rx="6" class="cb" fill="#fff0f5"/>
    <text x="64" y="406" class="c1">this.lastTerminalWidth = w</text>

    <!-- Width shrink note -->
    <rect x="52" y="434" width="278" height="62" rx="8" fill="#2a1028" stroke="#ff6b9d" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="66" y="454" class="n1" style="fill:#ffa0c4;">log.clear() erases all previous</text>
    <text x="66" y="470" class="n1" style="fill:#ffa0c4;">output lines to prevent stale</text>
    <text x="66" y="486" class="n1" style="fill:#ffa0c4;">content overlapping the new frame.</text>

    <!-- Throttle note -->
    <rect x="52" y="516" width="278" height="46" rx="8" fill="#2a1028" stroke="#ffd700" stroke-width="1.5"/>
    <text x="66" y="536" class="c1" style="fill:#ffd700;">onRender = throttle(fn, 33ms)</text>
    <text x="66" y="552" class="n1" style="fill:#a0dce4;">30 FPS, leading + trailing</text>
  </g>

  <!-- ── STAGE B: calculateLayout() ── -->
  <g filter="url(#sh2)">
    <rect x="396" y="72" width="300" height="536" rx="14" fill="#1a1810" stroke="url(#stB)" stroke-width="2.5" opacity="0.94"/>
    <rect x="396" y="72" width="300" height="38" rx="14" fill="url(#stB)"/>
    <rect x="396" y="96" width="300" height="14" fill="url(#stB)"/>
    <text x="416" y="98" class="sl">B. LAYOUT ENGINE</text>
    <text x="580" y="98" class="sl2" style="fill:#fff3dc;">ink.js:116-120</text>

    <rect x="412" y="128" width="268" height="42" rx="6" class="cb" fill="#fff8ed"/>
    <text x="424" y="148" class="c1">calculateLayout() {</text>
    <text x="424" y="164" class="c1">  w = getTerminalWidth()</text>

    <path d="M546 172 L546 184" stroke="#e8850c" stroke-width="2"/>

    <rect x="412" y="188" width="268" height="42" rx="6" class="cb" fill="#fff8ed"/>
    <text x="424" y="208" class="c1">rootNode.yogaNode</text>
    <text x="424" y="224" class="c1">  .setWidth(w)</text>

    <path d="M546 232 L546 244" stroke="#e8850c" stroke-width="2"/>

    <rect x="412" y="248" width="268" height="54" rx="6" class="cb" fill="#fff3dc"/>
    <text x="424" y="268" class="c1">yogaNode.calculateLayout(</text>
    <text x="424" y="284" class="c1">  undefined, undefined,</text>
    <text x="424" y="296" class="c1">  Yoga.DIRECTION_LTR)</text>

    <!-- Yoga detail -->
    <rect x="412" y="322" width="268" height="100" rx="8" fill="#2a1e0a" stroke="#e8850c" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="426" y="342" class="sl2" style="fill:#ffa751;">YOGA FLEXBOX ENGINE</text>
    <text x="426" y="360" class="n1" style="fill:#f0c878;">Traverses component tree</text>
    <text x="426" y="376" class="n1" style="fill:#f0c878;">computing: getComputedWidth(),</text>
    <text x="426" y="392" class="n1" style="fill:#f0c878;">getComputedHeight(), Left, Top</text>
    <text x="426" y="408" class="n1" style="fill:#f0c878;">for every Ink node in the tree.</text>

    <!-- Node creation note -->
    <rect x="412" y="442" width="268" height="80" rx="8" fill="#2a1e0a" stroke="#e8850c" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="426" y="462" class="sl2" style="fill:#ffa751;">NODE TREE (dom.js)</text>
    <text x="426" y="480" class="n1" style="fill:#f0c878;">Each component gets</text>
    <text x="426" y="496" class="n1" style="fill:#f0c878;">Yoga.Node.create() with</text>
    <text x="426" y="512" class="n1" style="fill:#f0c878;">flex, margin, padding, and</text>

    <!-- Reconciler path -->
    <rect x="412" y="542" width="268" height="46" rx="8" fill="#2a1e0a" stroke="#36d1dc" stroke-width="1.5"/>
    <text x="426" y="560" class="c1" style="fill:#36d1dc;">resetAfterCommit()</text>
    <text x="426" y="576" class="c2" style="fill:#5ec4d0;">also calls calculateLayout</text>
  </g>

  <!-- ── STAGE C: render() + Output ── -->
  <g filter="url(#sh2)">
    <rect x="746" y="72" width="300" height="536" rx="14" fill="#0a1a1e" stroke="url(#stC)" stroke-width="2.5" opacity="0.94"/>
    <rect x="746" y="72" width="300" height="38" rx="14" fill="url(#stC)"/>
    <rect x="746" y="96" width="300" height="14" fill="url(#stC)"/>
    <text x="766" y="98" class="sl">C. RENDER + OUTPUT</text>
    <text x="930" y="98" class="sl2" style="fill:#d4f5f0;">renderer.js</text>

    <rect x="762" y="128" width="268" height="42" rx="6" class="cb" fill="#e0f7fa"/>
    <text x="774" y="148" class="c1">onRender() {</text>
    <text x="774" y="164" class="c1">  render(this.rootNode)</text>

    <path d="M896 172 L896 184" stroke="#36d1dc" stroke-width="2"/>

    <rect x="762" y="188" width="268" height="42" rx="6" class="cb" fill="#e0f7fa"/>
    <text x="774" y="208" class="c1">new Output(</text>
    <text x="774" y="224" class="c1">  computedW, computedH)</text>

    <path d="M896 232 L896 244" stroke="#36d1dc" stroke-width="2"/>

    <rect x="762" y="248" width="268" height="54" rx="6" class="cb" fill="#d4f5f0"/>
    <text x="774" y="268" class="c1">renderNodeToOutput(</text>
    <text x="774" y="284" class="c1">  node, output)</text>
    <text x="774" y="296" class="c2">// recursive tree walk</text>

    <path d="M896 304 L896 316" stroke="#36d1dc" stroke-width="2"/>

    <rect x="762" y="320" width="268" height="42" rx="6" class="cb" fill="#d4f5f0"/>
    <text x="774" y="340" class="c1">output.write(x, y, text,</text>
    <text x="774" y="356" class="c1">  { transformers })</text>

    <path d="M896 364 L896 376" stroke="#36d1dc" stroke-width="2"/>

    <rect x="762" y="380" width="268" height="28" rx="6" class="cb" fill="#b2ebf2"/>
    <text x="774" y="400" class="c1" style="font-weight:800;">output.get() -> frameString</text>

    <!-- Output.get detail -->
    <rect x="762" y="428" width="268" height="100" rx="8" fill="#081e22" stroke="#36d1dc" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="776" y="448" class="sl2" style="fill:#36d1dc;">OUTPUT.GET() (output.js)</text>
    <text x="776" y="466" class="n1" style="fill:#a0dce4;">Init 2D char grid (h * w)</text>
    <text x="776" y="482" class="n1" style="fill:#a0dce4;">Process all write operations</text>
    <text x="776" y="498" class="n1" style="fill:#a0dce4;">Apply clip regions + transforms</text>
    <text x="776" y="514" class="n1" style="fill:#a0dce4;">Tokenize via ansi-tokenize</text>

    <!-- Multi-width note -->
    <rect x="762" y="548" width="268" height="40" rx="8" fill="#081e22" stroke="#36d1dc" stroke-width="1.5"/>
    <text x="776" y="566" class="n1" style="fill:#a0dce4;">Handles multi-width chars</text>
    <text x="776" y="580" class="n1" style="fill:#a0dce4;">(emoji) via wcswidth logic</text>
  </g>

  <!-- ── STAGE D: log-update ── -->
  <g filter="url(#sh2)">
    <rect x="1096" y="72" width="270" height="536" rx="14" fill="#0e1a10" stroke="url(#stD)" stroke-width="2.5" opacity="0.94"/>
    <rect x="1096" y="72" width="270" height="38" rx="14" fill="url(#stD)"/>
    <rect x="1096" y="96" width="270" height="14" fill="url(#stD)"/>
    <text x="1116" y="98" class="sl">D. DIFF + WRITE</text>
    <text x="1270" y="98" class="sl2" style="fill:#c8e6c9;">log-update.js</text>

    <rect x="1112" y="128" width="238" height="42" rx="6" class="cb" fill="#e8f5e9"/>
    <text x="1124" y="148" class="c1">if (output ===</text>
    <text x="1124" y="164" class="c1">    previousOutput)</text>

    <path d="M1231 172 L1231 184" stroke="#56ab2f" stroke-width="2"/>

    <rect x="1112" y="188" width="238" height="28" rx="6" class="cb" fill="#e8f5e9"/>
    <text x="1124" y="208" class="c2">  return // skip identical</text>

    <path d="M1231 218 L1231 230" stroke="#56ab2f" stroke-width="2"/>

    <rect x="1112" y="234" width="238" height="42" rx="6" class="cb" fill="#e8f5e9"/>
    <text x="1124" y="254" class="c1">ansiEscapes</text>
    <text x="1124" y="270" class="c1">  .eraseLines(prevCount)</text>

    <path d="M1231 278 L1231 290" stroke="#56ab2f" stroke-width="2"/>

    <rect x="1112" y="294" width="238" height="28" rx="6" class="cb" fill="#c8e6c9"/>
    <text x="1124" y="314" class="c1" style="font-weight:800;">stdout.write(newOutput)</text>

    <path d="M1231 324 L1231 336" stroke="#56ab2f" stroke-width="2"/>

    <rect x="1112" y="340" width="238" height="28" rx="6" class="cb" fill="#e8f5e9"/>
    <text x="1124" y="360" class="c1">previousOutput = output</text>

    <!-- Incremental mode -->
    <rect x="1112" y="388" width="238" height="100" rx="8" fill="#1a3a1e" stroke="#56ab2f" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="1126" y="408" class="sl2" style="fill:#56ab2f;">INCREMENTAL MODE</text>
    <text x="1126" y="426" class="n1" style="fill:#a0d8a4;">Split to line arrays</text>
    <text x="1126" y="442" class="n1" style="fill:#a0d8a4;">Compare line-by-line</text>
    <text x="1126" y="458" class="n1" style="fill:#a0d8a4;">Skip unchanged lines</text>
    <text x="1126" y="474" class="n1" style="fill:#a0d8a4;">cursorTo + eraseEndLine</text>

    <!-- Cursor management -->
    <rect x="1112" y="508" width="238" height="54" rx="8" fill="#1a3a1e" stroke="#56ab2f" stroke-width="1.5"/>
    <text x="1126" y="528" class="c1" style="fill:#56ab2f;">cliCursor.hide() // render</text>
    <text x="1126" y="548" class="c1" style="fill:#56ab2f;">cliCursor.show() // done()</text>
  </g>

  <!-- Legend -->
  <g transform="translate(36, 650)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#ffd700" stroke-width="3"/>
    <text x="30" y="4" class="lg2">Stage flow</text>
    <circle cx="120" cy="0" r="3" fill="#ffd700" opacity="0.7"/>
    <text x="130" y="4" class="lg2">Pipeline pulse</text>
    <rect x="230" y="-6" width="12" height="12" rx="2" fill="#081e22" stroke="#36d1dc" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="248" y="4" class="lg2">Internal detail</text>
    <text x="380" y="4" class="lg2">All function names and line numbers verified against ink/build/ source files</text>
  </g>
</svg>
