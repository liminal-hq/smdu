<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">smdu Internal Architecture</title>
  <desc id="desc">A colourful architectural diagram showing smdu runtime layers, module boundaries, and key data flows.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111a34"/>
      <stop offset="100%" stop-color="#0f2533"/>
      <animateTransform
        attributeName="gradientTransform"
        type="rotate"
        values="0 900 600;2.5 900 600;0 900 600"
        dur="42s"
        repeatCount="indefinite"
      />
    </linearGradient>

    <linearGradient id="terminalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3f74"/>
      <stop offset="100%" stop-color="#3f6dd3"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#325f8e"/>
      <stop offset="100%" stop-color="#2ba7b3"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5e3baf"/>
      <stop offset="100%" stop-color="#8f56d6"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f7a65"/>
      <stop offset="100%" stop-color="#3ebd86"/>
    </linearGradient>
    <linearGradient id="stateGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8d4a1f"/>
      <stop offset="100%" stop-color="#d68a2f"/>
    </linearGradient>
    <linearGradient id="reviewGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f2f86"/>
      <stop offset="100%" stop-color="#a75bd9"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25487d"/>
      <stop offset="100%" stop-color="#4b86c8"/>
    </linearGradient>
    <linearGradient id="supportGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#46464f"/>
      <stop offset="100%" stop-color="#707078"/>
    </linearGradient>
    <linearGradient id="depGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a3559"/>
      <stop offset="100%" stop-color="#a14a9e"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrowA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8bd6ff"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd37e"/>
    </marker>
    <marker id="arrowC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7ef4bd"/>
    </marker>
    <marker id="arrowD" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e7a3ff"/>
    </marker>

    <style>
      .title { font: 800 42px "Segoe UI", "Trebuchet MS", sans-serif; fill: #f4f7ff; letter-spacing: 0.5px; }
      .subtitle { font: 500 20px "Segoe UI", "Trebuchet MS", sans-serif; fill: #b7c5ea; }
      .layer { font: 700 22px "Segoe UI", "Trebuchet MS", sans-serif; fill: #ffffff; }
      .body { font: 500 16px "Segoe UI", "Trebuchet MS", sans-serif; fill: #ecf2ff; }
      .small { font: 500 13px "Segoe UI", "Trebuchet MS", sans-serif; fill: #dce5ff; }
      .tiny { font: 500 12px "Consolas", "Menlo", monospace; fill: #cde3ff; }
      .caption { font: 600 14px "Segoe UI", "Trebuchet MS", sans-serif; fill: #b6c9ff; }
      .card { stroke: #ffffff33; stroke-width: 1.5; rx: 18; ry: 18; filter: url(#softShadow); }
      .chip { stroke: #ffffff40; stroke-width: 1; rx: 10; ry: 10; }
      .flowA { fill: none; stroke: #8bd6ff; stroke-width: 3.5; marker-end: url(#arrowA); }
      .flowB { fill: none; stroke: #ffd37e; stroke-width: 3; marker-end: url(#arrowB); }
      .flowC { fill: none; stroke: #7ef4bd; stroke-width: 3; marker-end: url(#arrowC); }
      .flowD { fill: none; stroke: #e7a3ff; stroke-width: 2.8; marker-end: url(#arrowD); stroke-dasharray: 9 7; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1200" fill="url(#bgGrad)"/>

  <circle cx="270" cy="210" r="210" fill="#3c4f8830" filter="url(#glow)">
    <animate attributeName="cx" values="270;288;270" dur="34s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="210;196;210" dur="38s" repeatCount="indefinite"/>
    <animate attributeName="r" values="210;220;210" dur="46s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1540" cy="940" r="250" fill="#36a39a26" filter="url(#glow)">
    <animate attributeName="cx" values="1540;1518;1540" dur="36s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="940;956;940" dur="40s" repeatCount="indefinite"/>
    <animate attributeName="r" values="250;262;250" dur="48s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1150" cy="220" r="170" fill="#9a5bc630" filter="url(#glow)">
    <animate attributeName="cx" values="1150;1162;1150" dur="32s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="220;235;220" dur="35s" repeatCount="indefinite"/>
    <animate attributeName="r" values="170;178;170" dur="44s" repeatCount="indefinite"/>
  </circle>

  <text x="70" y="78" class="title">smdu Internal Architecture</text>
  <text x="70" y="110" class="subtitle">CLI + Ink + React runtime decomposition with scan, state, and review pipelines</text>

  <rect class="card" x="80" y="150" width="430" height="130" fill="url(#terminalGrad)"/>
  <text x="110" y="195" class="layer">User Terminal</text>
  <text x="110" y="224" class="body">Keyboard events, TTY resize, alternate screen buffer</text>
  <text x="110" y="250" class="tiny">input + rendering surface</text>

  <rect class="card" x="630" y="150" width="540" height="130" fill="url(#cliGrad)"/>
  <text x="660" y="195" class="layer">CLI Adapter · src/cli.tsx</text>
  <text x="660" y="224" class="body">commander options → render(App) → fullscreen buffer control</text>
  <text x="660" y="250" class="tiny">flags: path, theme, units, no-fullscreen</text>

  <rect class="card" x="480" y="330" width="840" height="190" fill="url(#appGrad)"/>
  <text x="520" y="380" class="layer">App Orchestrator · src/App.tsx</text>
  <text x="520" y="412" class="body">Lifecycle, scan control, input precedence, modal gating, timer, panel orchestration</text>
  <text x="520" y="438" class="small">Chooses view mode, composes overlays, applies persisted preferences, and triggers rescans</text>

  <rect class="chip" x="520" y="458" width="180" height="40" fill="#ffffff14"/>
  <text x="536" y="484" class="tiny">useInput routing</text>
  <rect class="chip" x="714" y="458" width="190" height="40" fill="#ffffff14"/>
  <text x="730" y="484" class="tiny">scan progress throttling</text>
  <rect class="chip" x="920" y="458" width="180" height="40" fill="#ffffff14"/>
  <text x="937" y="484" class="tiny">partial snapshots</text>
  <rect class="chip" x="1115" y="458" width="180" height="40" fill="#ffffff14"/>
  <text x="1132" y="484" class="tiny">settings + overlays</text>

  <rect class="card" x="130" y="580" width="560" height="260" fill="url(#scanGrad)"/>
  <text x="165" y="628" class="layer">Scan Engine · src/scanner.ts</text>
  <text x="165" y="658" class="body">Recursive lstat/readdir traversal with bounded concurrency</text>
  <text x="165" y="686" class="small">O(1) linked-list queue pLimit(64), symlink handling, error-tolerant traversal</text>
  <text x="165" y="715" class="tiny">Outputs: FileNode tree + ScanProgress + partial root snapshots</text>
  <rect class="chip" x="165" y="742" width="240" height="36" fill="#ffffff14"/>
  <text x="180" y="766" class="tiny">AbortController + ScanCancelledError</text>
  <rect class="chip" x="420" y="742" width="235" height="36" fill="#ffffff14"/>
  <text x="437" y="766" class="tiny">FileNode parent/children graph</text>

  <rect class="card" x="760" y="580" width="690" height="260" fill="url(#stateGrad)"/>
  <text x="795" y="628" class="layer">Domain State Engine · src/state.ts</text>
  <text x="795" y="658" class="body">useFileSystem manages navigation, sorting, selection, deletion, and view mode</text>
  <text x="795" y="686" class="small">Maintains per-root review state and stabilises nodes across partial scan updates</text>
  <text x="795" y="715" class="tiny">flat/tree/review lists + imperative actions consumed by App</text>

  <rect class="card" x="1460" y="580" width="280" height="500" fill="url(#depGrad)"/>
  <text x="1490" y="625" class="layer">External Libraries</text>
  <text x="1490" y="655" class="tiny">Ink, React, Commander, Conf</text>
  <text x="1490" y="680" class="tiny">filesize, file-type, date-fns</text>
  <text x="1490" y="705" class="tiny">Node fs/path/os process APIs</text>
  <text x="1490" y="735" class="caption">Boundary</text>
  <text x="1490" y="760" class="small">All I/O and rendering primitives are sourced from these packages.</text>

  <rect class="card" x="760" y="870" width="690" height="210" fill="url(#reviewGrad)"/>
  <text x="795" y="915" class="layer">Review Pipeline · src/review/*</text>
  <text x="795" y="943" class="small">Derived dataset flow for review mode (pure transformation stages)</text>

  <rect class="chip" x="795" y="962" width="95" height="38" fill="#ffffff16"/>
  <text x="810" y="987" class="tiny">derive</text>
  <rect class="chip" x="902" y="962" width="95" height="38" fill="#ffffff16"/>
  <text x="919" y="987" class="tiny">filter</text>
  <rect class="chip" x="1009" y="962" width="95" height="38" fill="#ffffff16"/>
  <text x="1028" y="987" class="tiny">sort</text>
  <rect class="chip" x="1116" y="962" width="95" height="38" fill="#ffffff16"/>
  <text x="1132" y="987" class="tiny">group</text>
  <rect class="chip" x="1223" y="962" width="95" height="38" fill="#ffffff16"/>
  <text x="1238" y="987" class="tiny">rows</text>
  <rect class="chip" x="1330" y="962" width="95" height="38" fill="#ffffff16"/>
  <text x="1338" y="987" class="tiny">toolbar/list</text>

  <rect class="card" x="80" y="870" width="650" height="210" fill="url(#uiGrad)"/>
  <text x="115" y="915" class="layer">Presentation Layer · src/components/*</text>
  <text x="115" y="945" class="small">Header, Footer, FileList, ReviewList, StatusPanel, modals, scan/timer banners</text>
  <text x="115" y="972" class="tiny">Windowed list rendering + responsive columns + semantic colour mapping</text>
  <rect class="chip" x="115" y="992" width="175" height="36" fill="#ffffff14"/>
  <text x="132" y="1016" class="tiny">FileList + heatmap</text>
  <rect class="chip" x="304" y="992" width="155" height="36" fill="#ffffff14"/>
  <text x="321" y="1016" class="tiny">ReviewList</text>
  <rect class="chip" x="472" y="992" width="220" height="36" fill="#ffffff14"/>
  <text x="489" y="1016" class="tiny">StatusPanel + Info/Help</text>

  <rect class="card" x="80" y="330" width="360" height="210" fill="url(#supportGrad)"/>
  <text x="112" y="375" class="layer">Cross-cutting Support</text>
  <text x="112" y="404" class="tiny">src/config.ts      persistent user preferences</text>
  <text x="112" y="428" class="tiny">src/keys.ts        action map + help labels</text>
  <text x="112" y="452" class="tiny">src/themes.ts      tokenised colour palettes</text>
  <text x="112" y="476" class="tiny">src/fileTypeColours.ts categorisation</text>
  <text x="112" y="500" class="tiny">src/utils/sanitize.ts output safety</text>

  <path class="flowA" d="M 510 215 C 560 215, 570 215, 630 215"/>
  <path class="flowA" d="M 900 280 C 900 300, 900 308, 900 330"/>

  <path class="flowB" d="M 770 430 C 620 500, 500 550, 410 580"/>
  <path class="flowC" d="M 1035 430 C 1080 500, 1090 540, 1110 580"/>
  <path class="flowA" d="M 990 520 C 980 620, 930 740, 860 870"/>
  <path class="flowC" d="M 905 840 C 810 860, 740 870, 730 900"/>

  <path class="flowD" d="M 690 700 C 860 690, 970 675, 1140 665"/>
  <path class="flowD" d="M 1140 700 C 980 720, 830 745, 690 770"/>

  <path class="flowB" d="M 440 430 C 500 410, 560 390, 650 380"/>
  <path class="flowC" d="M 440 470 C 540 540, 660 620, 760 650"/>
  <path class="flowA" d="M 440 510 C 510 640, 540 750, 560 870"/>

  <path class="flowD" d="M 1450 980 C 1430 980, 1420 980, 1425 980"/>
  <path class="flowD" d="M 1450 710 C 1360 650, 1290 610, 1210 600"/>
  <path class="flowD" d="M 1450 750 C 1360 770, 1290 810, 1210 870"/>

  <path class="flowD" d="M 890 981 L 902 981"/>
  <path class="flowD" d="M 997 981 L 1009 981"/>
  <path class="flowD" d="M 1104 981 L 1116 981"/>
  <path class="flowD" d="M 1211 981 L 1223 981"/>
  <path class="flowD" d="M 1318 981 L 1330 981"/>

  <rect x="120" y="1110" width="18" height="18" fill="#8bd6ff"/>
  <text x="146" y="1124" class="caption">Primary runtime control flow</text>
  <rect x="470" y="1110" width="18" height="18" fill="#ffd37e"/>
  <text x="496" y="1124" class="caption">Scan and orchestration commands</text>
  <rect x="860" y="1110" width="18" height="18" fill="#7ef4bd"/>
  <text x="886" y="1124" class="caption">State-driven render updates</text>
  <rect x="1240" y="1110" width="18" height="18" fill="#e7a3ff"/>
  <text x="1266" y="1124" class="caption">Feedback, derived flow, integration links</text>
</svg>
