<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">smdu Escape Sequence Sketch Map</title>
  <desc id="desc">A colourful sketch map of terminal escape sequence families used by smdu and Ink.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1d5"/>
      <stop offset="55%" stop-color="#ffe2f4"/>
      <stop offset="100%" stop-color="#d9f3ff"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0 0;25 10;0 0" dur="20s" repeatCount="indefinite"/>
    </linearGradient>

    <style>
      .title { font: 700 38px "Segoe Print", "Comic Sans MS", cursive; fill: #2f2d3e; }
      .sub { font: 600 18px "Segoe Print", "Comic Sans MS", cursive; fill: #5b5870; }
      .h { font: 700 22px "Segoe Print", "Comic Sans MS", cursive; fill: #2c2b41; }
      .t { font: 600 15px "Segoe Print", "Comic Sans MS", cursive; fill: #34384a; }
      .mono { font: 700 14px "Consolas", "Menlo", monospace; fill: #22334a; }
      .box1 { fill: #fff8ed; stroke: #d98000; stroke-width: 3; }
      .box2 { fill: #eef8ff; stroke: #317ee8; stroke-width: 3; }
      .box3 { fill: #f8efff; stroke: #7e3fc1; stroke-width: 3; }
      .box4 { fill: #edfff5; stroke: #169c6f; stroke-width: 3; }
      .arrow { fill: none; stroke: #5a5f78; stroke-width: 2.8; stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect x="0" y="0" width="1440" height="920" fill="url(#bg)"/>

  <path d="M64 118 C152 80 286 100 382 124 C540 164 706 128 876 122 C1038 116 1162 86 1332 120 C1394 136 1418 182 1418 244 C1420 374 1418 510 1412 640 C1408 760 1388 822 1280 854 C1086 912 900 860 706 860 C534 860 378 900 198 874 C102 860 72 820 68 730 C60 576 68 420 68 266 C68 206 44 156 64 118 Z" fill="#ffffffc9" stroke="#3a415e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M78 130 C162 96 292 116 386 138 C542 178 706 142 874 138 C1030 136 1156 100 1322 134 C1378 148 1400 190 1402 248 C1404 374 1402 508 1396 632 C1392 748 1374 806 1272 838 C1082 894 900 844 708 844 C540 844 390 882 212 858 C122 846 96 810 90 724 C82 576 90 422 90 272 C90 214 62 168 78 130 Z" fill="none" stroke="#ff6ca2" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="70" y="70" class="title">smdu Escape Sequence Sketch Map</text>
  <text x="72" y="100" class="sub">Motif diagram: what sequence families are in play and where they are used</text>

  <rect x="120" y="170" width="560" height="210" rx="20" ry="20" class="box1"/>
  <text x="146" y="208" class="h">App-level direct emissions from smdu</text>
  <text x="146" y="236" class="mono">CSI ?1049h</text>
  <text x="284" y="236" class="t">enter alternate screen</text>
  <text x="146" y="262" class="mono">CSI ?1049l</text>
  <text x="284" y="262" class="t">leave alternate screen</text>
  <text x="146" y="288" class="mono">BEL</text>
  <text x="284" y="288" class="t">timer completion beep</text>
  <text x="146" y="318" class="t">These are explicit smdu process.stdout.write side effects.</text>

  <rect x="760" y="170" width="560" height="210" rx="20" ry="20" class="box2"/>
  <text x="786" y="208" class="h">Ink interactive frame controls</text>
  <text x="786" y="236" class="mono">eraseLines  cursorUp  cursorTo  eraseEndLine</text>
  <text x="786" y="262" class="t">Used by log-update for minimal frame diffs</text>
  <text x="786" y="288" class="mono">clearTerminal</text>
  <text x="920" y="288" class="t">fallback full redraw path</text>
  <text x="786" y="318" class="t">These are emitted during Ink-driven redraw and update cycles.</text>

  <rect x="120" y="430" width="560" height="190" rx="20" ry="20" class="box3"/>
  <text x="146" y="466" class="h">Input-side escape decoding</text>
  <text x="146" y="494" class="t">Arrow keys, page keys, delete, escape and modifiers are parsed from byte sequences.</text>
  <text x="146" y="520" class="mono">stdin bytes  -> parseKeypress  -> normalised key object</text>
  <text x="146" y="550" class="t">smdu receives high-level input symbols via useInput callback.</text>

  <rect x="760" y="430" width="560" height="190" rx="20" ry="20" class="box4"/>
  <text x="786" y="466" class="h">Window title and OSC status</text>
  <text x="786" y="494" class="mono">OSC 0 / OSC 2</text>
  <text x="920" y="494" class="t">not currently emitted in this build</text>
  <text x="786" y="520" class="t">Terminal title remains controlled by shell and terminal host.</text>
  <text x="786" y="550" class="t">Potential future enhancement at CLI mount and unmount boundaries.</text>

  <path d="M680 274 C720 274 736 274 760 274" class="arrow"/>
  <path d="M680 524 C720 524 736 524 760 524" class="arrow"/>
  <path d="M400 380 C400 404 400 414 400 430" class="arrow"/>
  <path d="M1040 380 C1040 404 1040 414 1040 430" class="arrow"/>

  <g transform="translate(160 676)">
    <rect x="0" y="0" width="230" height="130" rx="14" ry="14" fill="#fff4cc" stroke="#d98000" stroke-width="3"/>
    <text x="18" y="36" class="h">ALT SCREEN</text>
    <text x="18" y="66" class="mono">?1049h / ?1049l</text>
    <text x="18" y="94" class="t">session shell</text>
  </g>

  <g transform="translate(448 676)">
    <rect x="0" y="0" width="230" height="130" rx="14" ry="14" fill="#ffe0ef" stroke="#ff5fa5" stroke-width="3"/>
    <text x="18" y="36" class="h">BELL</text>
    <text x="18" y="66" class="mono">\u0007</text>
    <text x="18" y="94" class="t">focus timer</text>
  </g>

  <g transform="translate(736 676)">
    <rect x="0" y="0" width="230" height="130" rx="14" ry="14" fill="#dff2ff" stroke="#317ee8" stroke-width="3"/>
    <text x="18" y="36" class="h">CURSOR OPS</text>
    <text x="18" y="66" class="mono">cursorUp cursorTo</text>
    <text x="18" y="94" class="t">Ink diffing</text>
  </g>

  <g transform="translate(1024 676)">
    <rect x="0" y="0" width="230" height="130" rx="14" ry="14" fill="#e5ffe5" stroke="#169c6f" stroke-width="3"/>
    <text x="18" y="36" class="h">INPUT PARSE</text>
    <text x="18" y="66" class="mono">ESC and CSI decode</text>
    <text x="18" y="94" class="t">useInput feed</text>
  </g>
</svg>
