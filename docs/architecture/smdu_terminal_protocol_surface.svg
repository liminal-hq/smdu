<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1080" role="img" aria-labelledby="title desc">
  <title id="title">smdu Terminal Protocol Surface</title>
  <desc id="desc">Colourful marker-style protocol map of terminal input parsing and output control sequences used by smdu and Ink.</desc>

  <defs>
    <linearGradient id="paper2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>

    <filter id="rough2" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="1" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>

    <pattern id="scribbleMint" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(20)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#0aa67e22" stroke-width="3"/>
      <line x1="6" y1="0" x2="6" y2="12" stroke="#0fbf9a1f" stroke-width="2.5"/>
    </pattern>

    <pattern id="scribbleGold" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(-18)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#f39c1230" stroke-width="4"/>
      <line x1="7" y1="0" x2="7" y2="14" stroke="#f1c40f26" stroke-width="3"/>
    </pattern>

    <pattern id="scribbleViolet" patternUnits="userSpaceOnUse" width="13" height="13" patternTransform="rotate(9)">
      <line x1="0" y1="0" x2="0" y2="13" stroke="#8e44ad2f" stroke-width="3.4"/>
      <line x1="6.5" y1="0" x2="6.5" y2="13" stroke="#b26dd52a" stroke-width="2.8"/>
    </pattern>

    <marker id="arrTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0a9d73"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d87800"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a35c0"/>
    </marker>

    <style>
      .title { font: 700 40px "Segoe Print", "Comic Sans MS", cursive; fill: #2d2b3d; }
      .sub { font: 600 20px "Segoe Print", "Comic Sans MS", cursive; fill: #5f5a73; }
      .h { font: 700 24px "Segoe Print", "Comic Sans MS", cursive; fill: #28263a; }
      .t { font: 600 15px "Segoe Print", "Comic Sans MS", cursive; fill: #353247; }
      .mono { font: 700 14px "Consolas", "Menlo", monospace; fill: #1f2f45; }
      .note { font: 700 15px "Segoe Print", "Comic Sans MS", cursive; fill: #6c3751; }
      .boxA { stroke: #0a9d73; stroke-width: 3; fill: #edfff9; }
      .boxB { stroke: #d87800; stroke-width: 3; fill: #fff8ef; }
      .boxC { stroke: #7a35c0; stroke-width: 3; fill: #f8f1ff; }
      .boxD { stroke: #2f7fe8; stroke-width: 3; fill: #eef5ff; }
      .flowA { fill: none; stroke: #0a9d73; stroke-width: 4; marker-end: url(#arrTeal); }
      .flowB { fill: none; stroke: #d87800; stroke-width: 4; marker-end: url(#arrOrange); }
      .flowC { fill: none; stroke: #7a35c0; stroke-width: 4; marker-end: url(#arrPurple); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1680" height="1080" fill="url(#paper2)"/>

  <text x="70" y="70" class="title">smdu Terminal Read/Write Protocol Surface</text>
  <text x="72" y="102" class="sub">Colourful marker protocol map: input parsing, render output, control sequences, and side-effects</text>

  <rect x="60" y="140" width="1560" height="870" rx="34" ry="34" fill="#ffffffba" stroke="#d6dcea" stroke-width="2" filter="url(#rough2)"/>

  <rect x="95" y="185" width="710" height="380" rx="24" ry="24" class="boxA" filter="url(#rough2)"/>
  <rect x="103" y="194" width="694" height="362" rx="20" ry="20" fill="url(#scribbleMint)"/>
  <text x="122" y="230" class="h">Read side (terminal -> app)</text>
  <text x="122" y="260" class="t">1) PTY sends bytes on stdin readable chunks</text>
  <text x="122" y="286" class="t">2) Ink internal App enables raw mode and reads utf8 chunks</text>
  <text x="122" y="312" class="t">3) Ink parseKeypress decodes escape sequences</text>
  <text x="122" y="338" class="t">4) useInput emits normalised key object + input string</text>
  <text x="122" y="364" class="t">5) smdu App routes actions (navigate/sort/filter/delete/timer)</text>
  <text x="122" y="390" class="mono">stdin.setRawMode(true) -> 'readable' -> parseKeypress(...) -> inputHandler(...)</text>

  <rect x="875" y="185" width="710" height="380" rx="24" ry="24" class="boxB" filter="url(#rough2)"/>
  <rect x="883" y="194" width="694" height="362" rx="20" ry="20" fill="url(#scribbleGold)"/>
  <text x="900" y="230" class="h">Write side (app -> terminal)</text>
  <text x="900" y="260" class="t">1) React commit enters Ink reconciler</text>
  <text x="900" y="286" class="t">2) Ink computes Yoga layout for current terminal width</text>
  <text x="900" y="312" class="t">3) renderer writes operations into Output buffer</text>
  <text x="900" y="338" class="t">4) output.get() materialises frame text</text>
  <text x="900" y="364" class="t">5) log-update applies ANSI erase/cursor diff and writes stdout bytes</text>
  <text x="900" y="390" class="mono">calculateLayout() -> renderNodeToOutput() -> output.get() -> stream.write(...)</text>

  <path d="M 770 420 C 820 420, 845 420, 875 420" class="flowA"/>

  <rect x="95" y="610" width="1490" height="180" rx="24" ry="24" class="boxC" filter="url(#rough2)"/>
  <rect x="103" y="619" width="1474" height="162" rx="20" ry="20" fill="url(#scribbleViolet)"/>
  <text x="122" y="648" class="h">Control sequences and terminal protocol side-effects</text>

  <text x="122" y="678" class="mono">CSI ?1049h</text>
  <text x="252" y="678" class="t">Enter alternate screen (smdu startup)</text>

  <text x="122" y="704" class="mono">CSI ?1049l</text>
  <text x="252" y="704" class="t">Leave alternate screen (smdu exit)</text>

  <text x="122" y="730" class="mono">BEL (\u0007)</text>
  <text x="252" y="730" class="t">Timer completion bell (smdu focus timer)</text>

  <text x="860" y="678" class="mono">eraseLines / cursorUp / cursorTo / eraseEndLine</text>
  <text x="860" y="704" class="t">Ink log-update diff writes and frame cleanup</text>

  <text x="860" y="730" class="mono">clearTerminal</text>
  <text x="860" y="756" class="t">Used when previous output exceeds rows (Ink safety reset)</text>

  <text x="122" y="756" class="mono">Cursor hide/show</text>
  <text x="252" y="756" class="t">Managed by Ink/cli-cursor during interactive rendering</text>

  <rect x="95" y="825" width="1490" height="150" rx="24" ry="24" class="boxD" filter="url(#rough2)"/>
  <text x="122" y="860" class="h">Bells and whistles notes</text>
  <text x="122" y="888" class="t">Current behaviour: strong control-sequence support for screen, cursor, erase, and bell.</text>
  <text x="122" y="914" class="t">Window title sequences (OSC 0/2) are not currently emitted by smdu or Ink in this build.</text>
  <text x="122" y="940" class="note">If title updates are added later, that belongs at the smdu CLI boundary before/after Ink mount.</text>

  <path d="M 450 566 C 450 594, 450 602, 450 610" class="flowC"/>
  <path d="M 1220 566 C 1220 594, 1220 602, 1220 610" class="flowB"/>
  <path d="M 840 790 C 840 812, 840 816, 840 825" class="flowA dashed"/>
</svg>
